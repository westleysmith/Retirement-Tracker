# Pocket Check brand theme
#
# We intentionally do NOT pin backgroundColor / textColor here so that the
# app can honor the user's browser / OS theme via CSS prefers-color-scheme
# in Auto mode. Only the brand primary color is fixed.
[theme]
primaryColor = "#2ecc71"
font = "sans serif"

[server]
address = "127.0.0.1"
headless = true
